{% extends 'base.html' %}

{% block title %}Lista de Cursos{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">Oferta Académica</h2>
    <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill px-3">
        <i class="fas fa-undo me-1"></i> Volver al Dashboard
    </a>
</div>

<div class="row">
    {% for curso in cursos %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm border-0 border-top border-primary border-4">
            <div class="card-body">
                <h5 class="fw-bold">{{ curso.nombre }}</h5>
                <p class="small text-muted mb-3"><i class="fas fa-user-tie me-1"></i> {{ curso.profesor }}</p>
                <div class="d-grid">
                    <a href="{% url 'detalle_curso' curso.id %}" class="btn btn-sm btn-outline-primary rounded-pill">Ver detalles</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body text-center">
                <h3>Restablecer Contraseña</h3>
                <p class="text-muted">Introduce tu email y te enviaremos un enlace para cambiar tu clave.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="tu-email@ejemplo.com" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Enviar enlace de recuperación</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
